version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/dotdevlabs/ctlkit/pkg/version.Version={{.Version}}
      - -X github.com/dotdevlabs/ctlkit/pkg/version.Commit={{.Commit}}
      - -X github.com/dotdevlabs/ctlkit/pkg/version.Date={{.Date}}

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]

brews:
  - name: clusterctl
    repository:
      owner: dotdevlabs
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"
    directory: Formula
    homepage: "https://github.com/dotdevlabs/clusterctl"
    description: "Cluster lifecycle management CLI tool"
    install: |
      bin.install "clusterctl"
    test: |
      system "#{bin}/clusterctl", "version"

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
