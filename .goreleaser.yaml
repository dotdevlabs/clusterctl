version: 2

before:
  hooks:
    - go mod tidy

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/dotdevlabs/clusterctl/internal/version.Version={{.Version}}
      - -X github.com/dotdevlabs/clusterctl/internal/version.Commit={{.Commit}}
      - -X github.com/dotdevlabs/clusterctl/internal/version.BuildDate={{.Date}}

archives:
  - format: tar.gz
    name_template: >-
      {{ .ProjectName }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        format: zip

brews:
  - repository:
      owner: dotdevlabs
      name: homebrew-tap
    homepage: https://github.com/dotdevlabs/clusterctl
    description: Cluster lifecycle management CLI tool

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
